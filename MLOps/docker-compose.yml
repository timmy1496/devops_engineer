version: "3.9"

services:

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
    depends_on:
      - ollama

volumes:
  ollama_data: