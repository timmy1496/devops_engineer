- name: Install baseline packages (best-effort on Amazon Linux)
  ansible.builtin.package:
    name: "{{ baseline_packages }}"
    state: present
  become: true
  ignore_errors: true

- name: Ensure .ssh directories exist
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ ssh_users }}"
  become: true

- name: Set authorized_keys for users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    state: present
    key: "{{ item.1 }}"
  loop: "{{ ssh_users | subelements('authorized_keys') }}"
  become: true